<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyen Thuy Huong</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome cho icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Dancing+Script:wght@700&family=Lora:ital,wght@0,400;0,500;1,400&family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Confetti Container -->
    <div id="confetti-container"></div>
    
    <!-- Floating Elements -->
    <div class="floating-elements">
        <div class="floating-item">🌸</div>
        <div class="floating-item">🌷</div>
        <div class="floating-item">🍃</div>
        <div class="floating-item">✨</div>
        <div class="floating-item">💫</div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="main-title" id="main-title">
                <span class="title-icon" aria-hidden="true">🕊️</span>
                <span class="name-highlight" id="title-text">Nguyễn Thúy Hường</span>
                <span class="title-icon" aria-hidden="true">🌸</span>
            </h1>
            <div class="subtitle">
                <p class="date-text">09 April</p>
                <p class="wish-text">Wishing you the happiest day 🌟</p>
            </div>
        </header>

        <!-- Image Carousel -->
        <section class="image-section">
            <div class="carousel-container">
                <div class="carousel" id="carousel">
                    <div class="carousel-item active">
                        <img src="2.jpg" alt="Birthday Photo 1" class="carousel-image">
                        <div class="image-overlay">
                            <span class="image-caption">Beautiful Moments</span>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="1.jpg" alt="Birthday Photo 2" class="carousel-image">
                        <div class="image-overlay">
                            <span class="image-caption">Sweet Memories</span>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="3.jpg" alt="Birthday Photo 3" class="carousel-image">
                        <div class="image-overlay">
                            <span class="image-caption">Happy Times</span>
                        </div>
                    </div>
                </div>
                
                <!-- Carousel Controls -->
                <button class="carousel-btn prev" id="prevBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="carousel-btn next" id="nextBtn">
                    <i class="fas fa-chevron-right"></i>
                </button>
                
                <!-- Carousel Indicators -->
                <div class="carousel-indicators">
                    <span class="indicator active" data-slide="0"></span>
                    <span class="indicator" data-slide="1"></span>
                    <span class="indicator" data-slide="2"></span>
                </div>
            </div>
        </section>

        <!-- Surprise Letter -->
        <section class="surprise-section">
            <div class="scene" id="scene">
                <div class="envelope-wrap" id="envelope" role="button" tabindex="0" aria-label="Open letter">
                    <div class="envelope">
                        <div class="envelope-base"></div>
                        <div class="flap"></div>
                        <div class="seal">💌</div>
                    </div>
                    <p class="hint">Bức thư gửi cậu</p>
                </div>

                <div class="overlay" id="overlay" aria-hidden="true">
                    <article class="letter" id="letter" aria-live="polite">
                        <h2 class="letter-title" id="letterTitleEl"></h2>
                        <div class="letter-body" id="letterBodyEl"></div>
                        <p class="signature" id="letterSignEl"></p>
                    </article>
                </div>
            </div>
        </section>

        <!-- Nhạc nền: RiverFlowsinYou.mp4 (phát ẩn, autoplay trong JS) -->
        <section class="music-section music-section--sr" aria-hidden="true">
            <video id="bgMusic" class="bg-music-video" playsinline webkit-playsinline loop preload="auto" muted>
                <source src="RiverFlowsinYou.mp4" type="video/mp4">
            </video>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer-text">
                Wishing you a wonderful day full of smiles and joy
            </p>
        </footer>
    </div>

    <!-- Image Preview Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <div class="modal-image-container">
                <span class="modal-close">&times;</span>
                <img id="modalImage" src="" alt="Preview">
                <div class="modal-image-caption" id="modalImageCaption"></div>
            </div>
            <div class="modal-actions">
                <button class="modal-nav-btn modal-prev" id="modalPrevBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="download-btn" id="downloadBtn">
                    <i class="fas fa-download"></i> Tải xuống
                </button>
                <button class="modal-nav-btn modal-next" id="modalNextBtn">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
